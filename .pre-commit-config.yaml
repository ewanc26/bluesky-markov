# Pre-commit hook: format JS/TS/JSON/YAML/MD/CSS with Prettier.
# Runs locally (no remote repo) — requires node_modules available at commit time.
repos:
  - repo: local
    hooks:
      - id: prettier
        name: prettier
        entry: npx prettier --write --ignore-unknown
        language: system
        types_or: [javascript, jsx, ts, tsx, json, yaml, markdown, css]
        pass_filenames: true
